services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solid-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - solid-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: solid
      DB_USERNAME: solid
      DB_PASSWORD: secret

  nginx:
    image: nginx:1.27-alpine
    container_name: solid-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - solid-network
    depends_on:
      app:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: solid-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: solid
      MYSQL_USER: solid
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - solid-mysql-data:/var/lib/mysql
    networks:
      - solid-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  solid-network:
    driver: bridge

volumes:
  solid-mysql-data:
    driver: local
